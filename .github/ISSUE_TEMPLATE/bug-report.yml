name: Bug Report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Digital Utopia are you using?
      placeholder: "e.g., 0.3.1 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Engine (agent lifecycle)
        - Economy (token system)
        - Dashboard (frontend)
        - Message Bus (inbox/outbox)
        - Agent Spawning
        - Bootstrap / Setup
        - Other
    validations:
      required: true

  - type: textarea
    id: describe-bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "Agent X fails to wake up when..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How do we reproduce this issue?
      placeholder: |
        1. Run `npm run bootstrap`
        2. Awaken agent 'atlas'
        3. Send message to 'forge'
        4. Error appears...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output here
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues and this is not a duplicate
          required: true
        - label: I have provided all the information above
          required: true
